# mavlink-router config — installed to /etc/mavlink-router/main.conf
#
# One serial input (the flight controller) fanned out to:
#   * a UDP server on :14550  — GCS dial in as a UDP client (Mission Planner UDPCl, QGC)
#   * a TCP server on :5760   — GCS dial in over TCP (more reliable on lossy 4G)
#
# Both servers accept MULTIPLE simultaneous ground stations, so Mission Planner
# and QGroundControl can be connected at the same time.

[General]
# TCP server for GCS clients. Set to 0 to disable.
TcpServerPort=5760
ReportStats=false
# auto-detect MAVLink 1 vs 2 from the FC.
MavlinkDialect=auto
# Log nothing to disk by default (SD-card friendly). Point this at a dir to enable.
#Log=/var/log/mavlink-router

[UartEndpoint fc]
Device=/dev/serial0
# Must match ArduPilot SERIALx_BAUD. 57600 is ArduPilot's Telem2 default.
# Bump both sides to 115200 for faster param/log transfer over the link.
Baud=57600

[UdpEndpoint gcs]
# Server mode: the router waits for a GCS to send the first packet, learns its
# address, then streams telemetry back. Works through Tailscale without any
# fixed PC IP baked in here.
Mode=Server
Address=0.0.0.0
Port=14550
